name: Protect Master Branch
on:
  pull_request:
    branches:
      - master

jobs:
  check-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Check source branch
        if: github.head_ref != 'dev' # Allowed source branch
        run: |
          echo "Error: Only 'development' branch can merge into 'master'."
          exit 1   