site_name: Python Edison

# This text shows in the footer.
copyright: Digital Initiatives - Bendigo Kangan Institute

site_url: https://bki-di-python-edison.netlify.app

nav:
  # The Return to Portal item should always be the first item in the navigation.
  - Return to Portal: https://bki-di-portal.netlify.app/

  # Add additional navigation below this point:
  - Python:
    - Resources:
      - Intro to Python & Edison: python/resources/python-edison-intro.md
      - Variables: python/resources/python-variables.md
      - Functions: python/resources/python-functions.md
      - Iteration - Event Loop: python/resources/iteration-event-loop.md
      - Selection if / else / elif: python/resources/selection-if-else-elif.md
      - Selection in the Event Loop: python/resources/selection-event-loop.md
    - Tasks:
      - Task 1 - Intro to Edison: python/tasks/task-1-intro-to-edison.md
      - Task 2 - Variables: python/tasks/task-2-variables.md
      - Task 3 - Functions: python/tasks/task-3-functions.md
      - Task 4 - Functions, Parameters, Return: python/tasks/task-4-functions-params-returns.md
      - Task 5 - Event Loop: python/tasks/task-5-event-loop.md
      - Task 6 - Selection: python/tasks/task-6-selection.md
      - Task 7 - Loops with Conditions: python/tasks/task-7-loops-with-conditions.md
      - Task 8 - For Loops: python/tasks/task-8-for-loops.md
      - Task 9 - Lists: python/tasks/task-9-lists.md

# Do not touch anything below this line unless you knwo what you are doing.
theme:
  name: material
  palette:
    primary: deep orange
  features:
    - toc.integrate 
    - navigation.sections
    - navigation.path
    - navigation.footer
    - header.hide
    - content.code.copy
    - content.code.annotate

plugins:
  - enumerate-headings:
      increment_across_pages: true
      restart_increment_after: 
        - python/tasks/task-1-intro-to-edison.md

extra:
  generator: false

markdown_extensions:
  - pymdownx.highlight:
      linenums: true
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - attr_list
  - md_in_html

extra_css:
  - extra/style.css
